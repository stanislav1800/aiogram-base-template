version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: aiogram-base-template-redis
    restart: always
    ports:
      - "6378:6379"
    volumes:
      - redis_data:/data

  db:
    image: postgres:16-alpine
    container_name: aiogram-base-template-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build:
      context: .
    container_name: aiogram-base-template-bot
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
